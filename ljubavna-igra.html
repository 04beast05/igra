<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naša Tajna Igra 🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --hot-pink: #FF1F7D;
    --electric-purple: #8B00FF;
    --neon-orange: #FF6B00;
    --sunny-yellow: #FFE500;
    --cyan: #00E5FF;
    --lime: #39FF14;
    --dark: #0D0D0D;
    --card-bg: #1A1A2E;
    --text-light: #FFF5F9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--dark);
    color: var(--text-light);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Comic dot pattern background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,31,125,0.15) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 20px 16px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* ───────── HEADER ───────── */
  header {
    text-align: center;
    padding: 10px 0 0;
  }

  .logo-badge {
    display: inline-block;
    background: var(--hot-pink);
    color: var(--sunny-yellow);
    font-family: 'Bangers', cursive;
    font-size: clamp(13px, 3.5vw, 16px);
    letter-spacing: 2px;
    padding: 4px 14px;
    border-radius: 4px;
    border: 2px solid var(--sunny-yellow);
    margin-bottom: 10px;
    transform: rotate(-1.5deg);
    display: inline-block;
    box-shadow: 3px 3px 0 var(--neon-orange);
  }

  h1 {
    font-family: 'Bangers', cursive;
    font-size: clamp(42px, 11vw, 72px);
    line-height: 1;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--hot-pink), var(--sunny-yellow), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(3px 3px 0 rgba(255,31,125,0.5));
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: clamp(13px, 3.5vw, 16px);
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    font-weight: 600;
  }

  /* ───────── CATEGORY CHIPS ───────── */
  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    width: 100%;
  }

  .chip {
    cursor: pointer;
    padding: 6px 14px;
    border-radius: 99px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.5px;
    border: 2.5px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }

  .chip[data-cat="soft"]     { background: rgba(0,229,255,0.12); border-color: var(--cyan);    color: var(--cyan); }
  .chip[data-cat="srednje"]  { background: rgba(255,107,0,0.12); border-color: var(--neon-orange); color: var(--neon-orange); }
  .chip[data-cat="vruće"]    { background: rgba(255,31,125,0.15); border-color: var(--hot-pink); color: var(--hot-pink); }
  .chip[data-cat="tantric"]  { background: rgba(139,0,255,0.15); border-color: var(--electric-purple); color: #CF80FF; }
  .chip[data-cat="spicy"]    { background: rgba(57,255,20,0.1); border-color: var(--lime); color: var(--lime); }
  .chip[data-cat="ekstra"]   { background: rgba(255,229,0,0.1); border-color: var(--sunny-yellow); color: var(--sunny-yellow); }

  .chip.active {
    transform: scale(1.06);
    box-shadow: 0 0 14px currentColor;
  }

  .chip[data-cat="soft"].active    { background: var(--cyan); color: var(--dark); }
  .chip[data-cat="srednje"].active { background: var(--neon-orange); color: var(--dark); }
  .chip[data-cat="vruće"].active   { background: var(--hot-pink); color: white; }
  .chip[data-cat="tantric"].active { background: var(--electric-purple); color: white; }
  .chip[data-cat="spicy"].active   { background: var(--lime); color: var(--dark); }
  .chip[data-cat="ekstra"].active  { background: var(--sunny-yellow); color: var(--dark); }

  /* ───────── CARD ───────── */
  .card-wrap {
    width: 100%;
    perspective: 800px;
  }

  .card {
    position: relative;
    width: 100%;
    min-height: 260px;
    background: var(--card-bg);
    border-radius: 20px;
    border: 3px solid var(--hot-pink);
    box-shadow:
      6px 6px 0 var(--electric-purple),
      12px 12px 0 rgba(255,31,125,0.2);
    padding: 36px 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    transition: transform 0.15s, box-shadow 0.15s;
    overflow: hidden;
  }

  .card.flip-out {
    animation: flipOut 0.25s ease-in forwards;
  }
  .card.flip-in {
    animation: flipIn 0.28s ease-out forwards;
  }

  @keyframes flipOut {
    0%   { transform: rotateY(0) scale(1); opacity: 1; }
    100% { transform: rotateY(90deg) scale(0.9); opacity: 0; }
  }
  @keyframes flipIn {
    0%   { transform: rotateY(-90deg) scale(0.9); opacity: 0; }
    100% { transform: rotateY(0) scale(1); opacity: 1; }
  }

  /* Comic panel accent lines */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--hot-pink), var(--electric-purple), var(--cyan), var(--sunny-yellow));
    border-radius: 18px 18px 0 0;
  }

  /* halftone corner decoration */
  .card::after {
    content: '';
    position: absolute;
    bottom: -20px; right: -20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,31,125,0.12) 2px, transparent 2px);
    background-size: 12px 12px;
    pointer-events: none;
  }

  .cat-label {
    font-family: 'Bangers', cursive;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 3px 12px;
    border-radius: 4px;
    border: 2px solid currentColor;
    align-self: flex-start;
    text-transform: uppercase;
  }

  .question-number {
    position: absolute;
    top: 16px;
    right: 20px;
    font-family: 'Bangers', cursive;
    font-size: 18px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
  }

  .question-text {
    font-size: clamp(18px, 5.5vw, 26px);
    font-weight: 700;
    line-height: 1.4;
    text-align: center;
    color: var(--text-light);
    padding: 0 4px;
  }

  .question-text.empty {
    color: rgba(255,255,255,0.2);
    font-size: clamp(15px, 4vw, 20px);
    font-weight: 600;
  }

  /* speech bubble tail */
  .bubble-tail {
    position: absolute;
    bottom: -16px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 16px solid var(--hot-pink);
  }

  /* ───────── PROGRESS ───────── */
  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--hot-pink), var(--electric-purple));
    transition: width 0.5s ease;
  }

  .progress-text {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    align-self: flex-end;
    font-weight: 600;
  }

  /* ───────── BUTTONS ───────── */
  .btn-row {
    display: flex;
    gap: 12px;
    width: 100%;
  }

  .btn {
    flex: 1;
    cursor: pointer;
    border: none;
    outline: none;
    border-radius: 14px;
    padding: 16px 10px;
    font-family: 'Bangers', cursive;
    font-size: clamp(18px, 5vw, 24px);
    letter-spacing: 1.5px;
    transition: all 0.12s;
    position: relative;
    top: 0;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-generate {
    background: var(--hot-pink);
    color: white;
    border: 3px solid white;
    box-shadow: 0 6px 0 #A0004A, 0 8px 20px rgba(255,31,125,0.4);
    flex: 2;
  }

  .btn-generate:active, .btn-generate.pressed {
    top: 4px;
    box-shadow: 0 2px 0 #A0004A, 0 4px 10px rgba(255,31,125,0.3);
  }

  .btn-skip {
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.55);
    border: 2.5px solid rgba(255,255,255,0.18);
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
    font-size: clamp(14px, 3.8vw, 18px);
    letter-spacing: 1px;
  }

  .btn-skip:active {
    top: 2px;
    box-shadow: 0 2px 0 rgba(0,0,0,0.2);
  }

  /* ───────── STATS BAR ───────── */
  .stats {
    display: flex;
    gap: 12px;
    width: 100%;
    justify-content: center;
  }

  .stat-box {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 6px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Bangers', cursive;
    font-size: 26px;
    letter-spacing: 1px;
  }

  .stat-label {
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    font-weight: 700;
    text-transform: uppercase;
  }

  /* ───────── TOAST ───────── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--sunny-yellow);
    color: var(--dark);
    font-family: 'Bangers', cursive;
    font-size: 18px;
    letter-spacing: 1px;
    padding: 10px 24px;
    border-radius: 99px;
    border: 3px solid var(--dark);
    box-shadow: 4px 4px 0 rgba(0,0,0,0.4);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* ───────── MOBILE TWEAKS ───────── */
  @media (max-width: 420px) {
    .card { min-height: 230px; padding: 30px 20px 24px; }
    .btn-row { gap: 8px; }
  }
</style>
</head>

</div>

<!-- Toast -->

/* === STATE === */
let pool = [];
let used = [];
let skipped = 0;
let total  = 0;
let activeCategories = new Set(["soft","srednje","vruće","tantric","spicy","ekstra"]);

const CAT_META = {
  soft:    { label: "💙 NJEŽNO",    col: "var(--cyan)" },
  srednje: { label: "🔶 ZAGRIJAVANJE", col: "var(--neon-orange)" },
  "vruće": { label: "🔥 VRUĆE",    col: "var(--hot-pink)" },
  tantric: { label: "🌀 TANTRIK",   col: "#CF80FF" },
  spicy:   { label: "🌶️ SPICY",    col: "var(--lime)" },
  ekstra:  { label: "⚡ EKSTRA",   col: "var(--sunny-yellow)" },
};

function buildPool() {
  pool = allQ.filter(q => activeCategories.has(q.cat));
  pool = pool.sort(() => Math.random() - 0.5);
  used = [];
}

function getQuestion() {
  if (pool.length === 0) {
    if (used.length === 0) return null; // no cats selected
    // refill from used
    pool = used.sort(() => Math.random() - 0.5);
    used = [];
    showToast("🔄 Krug završen — vrtimo ispočetka!");
  }
  const idx = Math.floor(Math.random() * pool.length);
  const q = pool[idx];
  pool.splice(idx, 1);
  used.push(q);
  return q;
}

function animateCard(cb) {
  const card = document.getElementById('card');
  card.classList.add('flip-out');
  setTimeout(() => {
    card.classList.remove('flip-out');
    cb();
    card.classList.add('flip-in');
    setTimeout(() => card.classList.remove('flip-in'), 300);
  }, 260);
}

function renderQuestion(q) {
  const el = document.getElementById('questionText');
  const catEl = document.getElementById('catLabel');
  const qNum = document.getElementById('qNum');
  const tail = document.getElementById('bubbleTail');
  const meta = CAT_META[q.cat];
  el.textContent = q.t;
  el.classList.remove('empty');
  catEl.textContent = meta.label;
  catEl.style.color = meta.col;
  catEl.style.borderColor = meta.col;
  document.getElementById('card').style.borderColor = meta.col;
  document.getElementById('card').style.boxShadow =
    `6px 6px 0 rgba(0,0,0,0.4), 0 0 30px ${meta.col}33`;
  tail.style.display = 'block';
  tail.style.borderTopColor = meta.col;
  qNum.textContent = `#${total}`;
  updateStats();
}

function nextQuestion() {
  if (activeCategories.size === 0) {
    showToast("Odaberi barem jednu kategoriju!");
    return;
  }
  const btn = document.getElementById('btnGen');
  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 200);

  total++;
  const q = getQuestion();
  if (!q) { showToast("Odaberi barem jednu kategoriju!"); total--; return; }
  animateCard(() => renderQuestion(q));
}

function skipQuestion() {
  if (!document.getElementById('questionText').textContent ||
      document.getElementById('questionText').classList.contains('empty')) return;
  skipped++;
  total++;
  const q = getQuestion();
  if (!q) return;
  animateCard(() => renderQuestion(q));
}

function updateStats() {
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statSkipped').textContent = skipped;
  const left = pool.length;
  document.getElementById('statLeft').textContent = left;
  const pct = used.length + pool.length > 0
    ? (used.length / (used.length + pool.length)) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent =
    `${used.length} / ${used.length + pool.length} odigranih u krugu`;
}

/* category chips */
document.getElementById('catRow').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  const cat = chip.dataset.cat;
  if (activeCategories.has(cat)) {
    if (activeCategories.size === 1) { showToast("Barem jedna kategorija mora biti aktivna!"); return; }
    activeCategories.delete(cat);
    chip.classList.remove('active');
  } else {
    activeCategories.add(cat);
    chip.classList.add('active');
  }
  buildPool();
  updateStats();
});

/* toast */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* init */
buildPool();
updateStats();
</script>
